<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chandu Music | Pro Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #1ED760; --bg: #000; --glass: rgba(255,255,255,0.06); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; padding-bottom: 180px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        
        /* Header & Search */
        header { display: flex; justify-content: space-between; align-items: center; padding: 10px 0 20px; }
        .search-container { position: relative; margin-bottom: 25px; }
        .search-container input { width: 100%; padding: 14px 45px; border-radius: 12px; border: 1px solid #333; background: var(--glass); color: #fff; outline: none; font-size: 1rem; }
        .search-container i { position: absolute; left: 15px; top: 16px; color: #888; }

        /* Grid */
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 20px; }
        .track-card { background: var(--glass); padding: 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; border: 1px solid transparent; }
        .track-card:hover { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        .track-card img { width: 100%; aspect-ratio: 1; border-radius: 15px; object-fit: cover; margin-bottom: 10px; }
        
        /* 🕹️ Full Player Bar */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(25px); border-top: 1px solid #222; padding: 15px 20px; display: none; z-index: 1000; }
        .player-inner { max-width: 1100px; margin: 0 auto; }
        .seek-box { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; }
        #seek-slider { flex: 1; accent-color: var(--accent); cursor: pointer; height: 5px; }
        .time-val { font-size: 11px; color: #888; min-width: 35px; }
        .p-controls { display: flex; align-items: center; justify-content: space-between; }
        .p-info { display: flex; align-items: center; gap: 12px; overflow: hidden; flex: 1; }
        .p-info img { width: 50px; height: 50px; border-radius: 8px; }
        .p-btns { display: flex; align-items: center; gap: 25px; }
        .p-btn { font-size: 1.5rem; cursor: pointer; color: #fff; }
        .play-main { font-size: 2.8rem; color: var(--accent); }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h2 id="greeting">Namaste, Chandu 🙏</h2>
            <i class="fas fa-cog" style="color:#333; cursor:pointer;" onclick="goAdmin()"></i>
        </header>

        <div class="search-container">
            <i class="fas fa-search"></i>
            <input type="text" id="searchInput" placeholder="Search songs or artists..." oninput="searchSongs()">
        </div>

        <div class="grid" id="list-container"></div>
    </div>

    <div class="player-bar" id="player">
        <div class="player-inner">
            <div class="seek-box">
                <span class="time-val" id="curTime">0:00</span>
                <input type="range" id="seek-slider" value="0" step="0.1">
                <span class="time-val" id="durTime">0:00</span>
            </div>
            <div class="p-controls">
                <div class="p-info">
                    <img id="p-img" src="">
                    <div style="overflow:hidden"><b id="p-title" style="white-space:nowrap;"></b><br><small id="p-art" style="color:#888"></small></div>
                </div>
                <div class="p-btns">
                    <i class="fas fa-step-backward p-btn" onclick="prevSong()"></i>
                    <i class="fas fa-pause-circle p-btn play-main" id="p-play-btn" onclick="togglePlay()"></i>
                    <i class="fas fa-step-forward p-btn" onclick="nextSong()"></i>
                </div>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        // Use your actual Firebase URL
        const firebaseConfig = { databaseURL: "https://chandu-music-default-rtdb.europe-west1.firebasedatabase.app" };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        const audio = document.getElementById('audio');
        const seek = document.getElementById('seek-slider');
        let allSongs = [], currentIndex = -1;

        // Load Songs
        db.ref('songs').on('value', snap => {
            const data = snap.val(); allSongs = [];
            for(let id in data) { allSongs.push({...data[id], id}); }
            render(allSongs);
        });

        function render(songs) {
            document.getElementById('list-container').innerHTML = songs.map((s, i) => `
                <div class="track-card" onclick="playSong(${i})">
                    <img src="${s.img}"><b>${s.title}</b><br><small>${s.artist}</small>
                </div>`).join('');
        }

        // 🔍 Search Function
        function searchSongs() {
            const q = document.getElementById('searchInput').value.toLowerCase();
            const filtered = allSongs.filter(s => s.title.toLowerCase().includes(q) || s.artist.toLowerCase().includes(q));
            render(filtered);
        }

        // ⚙️ Admin Login
        function goAdmin() { if(prompt("Enter Admin Pass:") === "1234") window.location.href="admin.html"; }

        function playSong(i) {
            if(i < 0 || i >= allSongs.length) return;
            currentIndex = i; const s = allSongs[i];
            audio.src = s.url; audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('p-title').innerText = s.title;
            document.getElementById('p-art').innerText = s.artist;
            document.getElementById('p-img').src = s.img;
            document.getElementById('p-play-btn').className = "fas fa-pause-circle p-btn play-main";
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('p-play-btn').className = "fas fa-pause-circle p-btn play-main"; }
            else { audio.pause(); document.getElementById('p-play-btn').className = "fas fa-play-circle p-btn play-main"; }
        }

        // 🕹️ Seek Bar Logic
        audio.ontimeupdate = () => {
            if(!isNaN(audio.duration)) {
                seek.value = (audio.currentTime / audio.duration) * 100;
                document.getElementById('curTime').innerText = fmt(audio.currentTime);
                document.getElementById('durTime').innerText = fmt(audio.duration);
            }
        };
        seek.oninput = () => { audio.currentTime = (seek.value / 100) * audio.duration; };
        function fmt(s) { return Math.floor(s/60) + ":" + ("0" + Math.floor(s%60)).slice(-2); }
        function nextSong() { playSong(currentIndex + 1); }
        function prevSong() { playSong(currentIndex - 1); }
        audio.onended = () => { nextSong(); };
    </script>
</body>
</html>
