<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chandu Music | Pro Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #1ED760; --bg: #000; --glass: rgba(255,255,255,0.06); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #000; background-image: radial-gradient(circle at 0% 0%, #1e3a2b 0%, transparent 40%); color: #fff; min-height: 100vh; }
        #auth-screen { position: fixed; inset: 0; z-index: 10000; background: rgba(0,0,0,0.9); backdrop-filter: blur(20px); display: flex; align-items: center; justify-content: center; padding: 20px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; padding-bottom: 150px; }
        header { display: flex; justify-content: space-between; align-items: center; padding: 20px 0; }
        .search-bar { position: relative; flex: 1; max-width: 400px; margin: 0 15px; }
        .search-bar input { width: 100%; padding: 12px 40px; border-radius: 12px; border: 1px solid #333; background: var(--glass); color: #fff; outline: none; }
        .search-bar i { position: absolute; left: 12px; top: 15px; color: #888; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        @media (max-width: 600px) { .grid { grid-template-columns: 1fr; } .track-card { display: flex !important; align-items: center; gap: 15px; } .track-card img { width: 60px !important; height: 60px !important; margin: 0 !important; } }
        .track-card { background: var(--glass); padding: 15px; border-radius: 20px; cursor: pointer; border: 1px solid transparent; transition: 0.3s; }
        .track-card:hover { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        .track-card img { width: 100%; aspect-ratio: 1; border-radius: 15px; object-fit: cover; margin-bottom: 10px; }
        
        /* 🕹️ Advanced Player Bar */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.9); backdrop-filter: blur(30px); border-top: 1px solid #222; padding: 15px 20px; display: none; z-index: 1000; }
        .p-content { max-width: 1100px; margin: 0 auto; display: flex; align-items: center; gap: 15px; }
        .p-info { flex: 1; display: flex; align-items: center; gap: 12px; overflow: hidden; }
        .p-info img { width: 50px; height: 50px; border-radius: 10px; }
        .p-controls { display: flex; align-items: center; gap: 20px; }
        .p-btn { font-size: 1.5rem; color: #fff; cursor: pointer; transition: 0.2s; }
        .p-btn:hover { color: var(--accent); }
        .play-main { font-size: 2.8rem; color: var(--accent); }
    </style>
</head>
<body>

    <div id="auth-screen">
        <div style="background:var(--glass); padding:40px; border-radius:30px; border:1px solid #333; width:100%; max-width:380px; text-align:center;">
            <h1>Chandu Music</h1>
            <input type="text" id="reg-name" placeholder="Name" style="width:100%; padding:15px; margin:10px 0; border-radius:10px; background:#111; color:#fff; border:1px solid #444;">
            <input type="number" id="reg-phone" placeholder="Mobile Number" style="width:100%; padding:15px; margin-bottom:20px; border-radius:10px; background:#111; color:#fff; border:1px solid #444;">
            <button onclick="register()" style="width:100%; padding:15px; border-radius:10px; background:var(--accent); border:none; font-weight:800; cursor:pointer;">Start Listening</button>
        </div>
    </div>

    <div class="container">
        <header>
            <h2 id="greet">Namaste</h2>
            <div class="search-bar"><i class="fas fa-search"></i><input type="text" id="search-input" placeholder="Search..." oninput="searchSongs()"></div>
            <i class="fas fa-cog" onclick="goAdmin()" style="cursor:pointer; color:#333;"></i>
        </header>
        <div class="grid" id="list-container"></div>
    </div>

    <div class="player-bar" id="player">
        <div class="p-content">
            <div class="p-info">
                <img id="p-img" src="">
                <div style="overflow:hidden"><b id="p-title" style="display:block; white-space:nowrap; text-overflow:ellipsis;"></b><small id="p-art" style="color:#888"></small></div>
            </div>
            <div class="p-controls">
                <i class="fas fa-step-backward p-btn" onclick="prevSong()"></i>
                <i class="fas fa-pause-circle p-btn play-main" id="p-play-btn" onclick="togglePlay()"></i>
                <i class="fas fa-step-forward p-btn" onclick="nextSong()"></i>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDwmohkSpr9XIy4vvlAieUqVQZv2bjAkTU",
            authDomain: "chandu-music.firebaseapp.com",
            databaseURL: "https://chandu-music-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chandu-music",
            storageBucket: "chandu-music.firebasestorage.app",
            messagingSenderId: "411466508966",
            appId: "1:411466508966:web:40612efd3ba687da1fa267"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allSongs = [];
        let currentIndex = -1;

        function register() {
            const n = document.getElementById('reg-name').value;
            const p = document.getElementById('reg-phone').value;
            if(n && p.length >= 10) { db.ref('users').push({name:n, phone:p}); localStorage.setItem('cm_user', n); location.reload(); }
        }

        window.onload = () => {
            const user = localStorage.getItem('cm_user');
            if(user) {
                document.getElementById('auth-screen').style.display='none';
                document.getElementById('greet').innerText = "Namaste, " + user;
                db.ref('songs').on('value', snap => {
                    const data = snap.val();
                    allSongs = [];
                    for(let id in data) { allSongs.push({...data[id], id}); }
                    render(allSongs);
                });
            }
        };

        function render(songs) {
            document.getElementById('list-container').innerHTML = songs.map((s, index) => `
                <div class="track-card" onclick="playSong(${index})">
                    <img src="${s.img}">
                    <b>${s.title}</b><span>${s.artist}</span>
                </div>`).join('');
        }

        const audio = document.getElementById('audio');
        function playSong(index) {
            if(index < 0 || index >= allSongs.length) return;
            currentIndex = index;
            const s = allSongs[currentIndex];
            audio.src = s.url; audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('p-title').innerText = s.title;
            document.getElementById('p-art').innerText = s.artist;
            document.getElementById('p-img').src = s.img;
            document.getElementById('p-play-btn').className = "fas fa-pause-circle p-btn play-main";
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('p-play-btn').className = "fas fa-pause-circle p-btn play-main"; }
            else { audio.pause(); document.getElementById('p-play-btn').className = "fas fa-play-circle p-btn play-main"; }
        }

        function nextSong() { playSong(currentIndex + 1); }
        function prevSong() { playSong(currentIndex - 1); }
        audio.onended = () => { nextSong(); }; // Auto-play next

        function searchSongs() {
            const term = document.getElementById('search-input').value.toLowerCase();
            const filtered = allSongs.filter(s => s.title.toLowerCase().includes(term));
            render(filtered);
        }

        function goAdmin() { if(prompt("Pass:") === "1234") window.location.href = "admin.html"; }
    </script>
</body>
</html>
