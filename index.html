<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chandu Music | Pro Player</title>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        :root { --accent: #1ED760; --bg: #000; --glass: rgba(255,255,255,0.06); }
        * { margin:0; padding:0; box-sizing:border-box; font-family: 'Plus Jakarta Sans', sans-serif; }
        body { background: #000; color: #fff; min-height: 100vh; padding-bottom: 160px; }
        .container { max-width: 1100px; margin: 0 auto; padding: 20px; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 20px; }
        .track-card { background: var(--glass); padding: 15px; border-radius: 20px; cursor: pointer; transition: 0.3s; text-align: center; }
        .track-card img { width: 100%; aspect-ratio: 1; border-radius: 15px; object-fit: cover; margin-bottom: 10px; }
        
        /* 🕹️ Player Bar & Seek Bar */
        .player-bar { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(10,10,10,0.95); backdrop-filter: blur(20px); border-top: 1px solid #222; padding: 15px; display: none; z-index: 1000; }
        .seek-container { display: flex; align-items: center; gap: 10px; margin-bottom: 10px; max-width: 1100px; margin-inline: auto; }
        #seek-slider { flex: 1; accent-color: var(--accent); cursor: pointer; height: 4px; }
        .time-text { font-size: 12px; color: #888; min-width: 35px; }
        .p-main-controls { display: flex; align-items: center; justify-content: space-between; max-width: 1100px; margin: 0 auto; }
        .p-info { display: flex; align-items: center; gap: 12px; flex: 1; }
        .p-info img { width: 45px; height: 45px; border-radius: 8px; }
        .p-btns { display: flex; align-items: center; gap: 20px; }
        .p-btn { font-size: 1.4rem; cursor: pointer; }
        .play-btn { font-size: 2.5rem; color: var(--accent); }
    </style>
</head>
<body>
    <div class="container">
        <h2 style="margin-bottom:20px;">Your Library</h2>
        <div class="grid" id="list-container"></div>
    </div>

    <div class="player-bar" id="player">
        <div class="seek-container">
            <span class="time-text" id="cur-time">0:00</span>
            <input type="range" id="seek-slider" value="0" step="0.1">
            <span class="time-text" id="dur-time">0:00</span>
        </div>
        <div class="p-main-controls">
            <div class="p-info">
                <img id="p-img" src=""><div style="overflow:hidden"><b id="p-title"></b><br><small id="p-art" style="color:#888"></small></div>
            </div>
            <div class="p-btns">
                <i class="fas fa-step-backward p-btn" onclick="prevSong()"></i>
                <i class="fas fa-pause-circle p-btn play-btn" id="p-play-btn" onclick="togglePlay()"></i>
                <i class="fas fa-step-forward p-btn" onclick="nextSong()"></i>
            </div>
        </div>
    </div>

    <audio id="audio"></audio>

    <script>
        const firebaseConfig = {
            databaseURL: "https://chandu-music-default-rtdb.europe-west1.firebasedatabase.app"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();
        let allSongs = [], currentIndex = -1;
        const audio = document.getElementById('audio');
        const seekSlider = document.getElementById('seek-slider');

        db.ref('songs').on('value', snap => {
            const data = snap.val(); allSongs = [];
            for(let id in data) { allSongs.push({...data[id], id}); }
            render(allSongs);
        });

        function render(songs) {
            document.getElementById('list-container').innerHTML = songs.map((s, i) => `
                <div class="track-card" onclick="playSong(${i})">
                    <img src="${s.img}"><b>${s.title}</b><br><small>${s.artist}</small>
                </div>`).join('');
        }

        function playSong(i) {
            if(i < 0 || i >= allSongs.length) return;
            currentIndex = i; const s = allSongs[i];
            audio.src = s.url; audio.play();
            document.getElementById('player').style.display = 'block';
            document.getElementById('p-title').innerText = s.title;
            document.getElementById('p-art').innerText = s.artist;
            document.getElementById('p-img').src = s.img;
            document.getElementById('p-play-btn').className = "fas fa-pause-circle p-btn play-btn";
        }

        function togglePlay() {
            if(audio.paused) { audio.play(); document.getElementById('p-play-btn').className = "fas fa-pause-circle p-btn play-btn"; }
            else { audio.pause(); document.getElementById('p-play-btn').className = "fas fa-play-circle p-btn play-btn"; }
        }

        audio.ontimeupdate = () => {
            if(!isNaN(audio.duration)) {
                seekSlider.value = (audio.currentTime / audio.duration) * 100;
                document.getElementById('cur-time').innerText = format(audio.currentTime);
                document.getElementById('dur-time').innerText = format(audio.duration);
            }
        };

        seekSlider.oninput = () => { audio.currentTime = (seekSlider.value / 100) * audio.duration; };
        function format(s) { return Math.floor(s/60) + ":" + ("0" + Math.floor(s%60)).slice(-2); }
        function nextSong() { playSong(currentIndex + 1); }
        function prevSong() { playSong(currentIndex - 1); }
        audio.onended = () => { nextSong(); };
    </script>
</body>
</html>
