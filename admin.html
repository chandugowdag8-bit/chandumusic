<!DOCTYPE html>
<html>
<head>
    <title>Admin Panel</title>
    <style>
        body { background: #111; color: #fff; font-family: sans-serif; padding: 40px; }
        .box { background: #222; padding: 20px; border-radius: 10px; max-width: 400px; }
        input { width: 100%; padding: 10px; margin: 10px 0; border-radius: 5px; border: none; }
        button { width: 100%; padding: 10px; background: #1ED760; border: none; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
    <div class="box">
        <h3>Add New Song</h3>
        <input type="text" id="t" placeholder="Song Title" onkeydown="chk(event, 'a')">
        <input type="text" id="a" placeholder="Artist" onkeydown="chk(event, 'i')">
        <input type="text" id="i" placeholder="Image URL" onkeydown="chk(event, 'u')">
        <input type="text" id="u" placeholder="MP3 Link" onkeydown="chk(event, 'btn')">
        <button id="btn" onclick="add()">Save Song</button>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <script>
        firebase.initializeApp({ databaseURL: "https://chandu-music-default-rtdb.europe-west1.firebasedatabase.app" });
        const db = firebase.database();

        // Move to next input on Enter
        function chk(e, next) {
            if(e.key === "Enter") {
                e.preventDefault();
                if(next === 'btn') add();
                else document.getElementById(next).focus();
            }
        }

        function add() {
            const title = document.getElementById('t');
            const artist = document.getElementById('a');
            const img = document.getElementById('i');
            const url = document.getElementById('u');

            if(title.value && url.value) {
                db.ref('songs').push({
                    title: title.value,
                    artist: artist.value,
                    img: img.value,
                    url: url.value
                }).then(() => {
                    // ✅ CLEAR ALL BOXES
                    title.value = ""; artist.value = ""; img.value = ""; url.value = "";
                    title.focus(); // Start again from top
                    alert("Saved!");
                });
            }
        }
    </script>
</body>
</html>
