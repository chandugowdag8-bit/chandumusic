<!DOCTYPE html>
<html lang="kn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin | Chandu Music</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.6.1/firebase-database-compat.js"></script>
    <style>
        body { background: #080808; color: #fff; font-family: sans-serif; padding: 20px; }
        .card { background: #111; padding: 20px; border-radius: 15px; border: 1px solid #222; margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #333; background: #000; color: #fff; }
        .btn { width: 100%; padding: 15px; background: #1ED760; border: none; border-radius: 50px; font-weight: 800; cursor: pointer; }
        table { width: 100%; border-collapse: collapse; margin-top: 20px; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #222; }
        th { color: #1ED760; font-size: 0.8rem; }
        .delete-btn { color: #ff4444; cursor: pointer; }
    </style>
</head>
<body>
    <div style="display:flex; justify-content:space-between; align-items:center">
        <h1>Admin Control</h1>
        <a href="index.html" style="color:#1ED760; text-decoration:none">Back to App</a>
    </div>

    <div class="card">
        <h3>Add Music</h3>
        <input type="text" id="title" placeholder="Song Title">
        <input type="text" id="artist" placeholder="Artist">
        <input type="text" id="img" placeholder="Image URL">
        <input type="text" id="url" placeholder="MP3 Link">
        <button class="btn" onclick="add()">Save Song</button>
    </div>

    <h3>Manage Library (Delete Songs)</h3>
    <table>
        <thead><tr><th>Song Name</th><th>Artist</th><th>Action</th></tr></thead>
        <tbody id="s-list"></tbody>
    </table>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyDwmohkSpr9XIy4vvlAieUqVQZv2bjAkTU",
            authDomain: "chandu-music.firebaseapp.com",
            databaseURL: "https://chandu-music-default-rtdb.europe-west1.firebasedatabase.app",
            projectId: "chandu-music",
            storageBucket: "chandu-music.firebasestorage.app",
            messagingSenderId: "411466508966",
            appId: "1:411466508966:web:40612efd3ba687da1fa267"
        };
        firebase.initializeApp(firebaseConfig);
        const db = firebase.database();

        function add() {
            const title = document.getElementById('title').value;
            const artist = document.getElementById('artist').value;
            const img = document.getElementById('img').value;
            const url = document.getElementById('url').value;
            if(title && url) db.ref('songs').push({ title, artist, img, url });
        }

        db.ref('songs').on('value', snap => {
            const data = snap.val();
            let html = '';
            for(let id in data) {
                html += `<tr><td>${data[id].title}</td><td>${data[id].artist}</td><td><i class="fas fa-trash delete-btn" onclick="deleteSong('${id}')"></i></td></tr>`;
            }
            document.getElementById('s-list').innerHTML = html;
        });

        function deleteSong(id) { if(confirm("Delete this song?")) db.ref('songs/' + id).remove(); }
    </script>
</body>
</html>
